<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derpy Birds - Thompson Rivers, BC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <svg style="position:absolute;width:0;height:0;overflow:hidden;">
        <defs>
            <filter id="paper-edge" x="-5%" y="-5%" width="110%" height="110%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="1" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
            <filter id="tree-edge" x="-3%" y="-3%" width="106%" height="106%">
                <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" seed="5" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <div id="game">
        <header id="header">
            <h1>Derpy Birds</h1>
            <div class="subtitle">Build birds from construction paper! &mdash; Thompson Rivers, BC</div>
            <nav id="bird-selector"></nav>
        </header>

        <main id="main">
            <!-- Palette: left column, never overlaps canvas -->
            <aside id="palette">
                <div id="palette-header">
                    <h3 id="palette-title">Choose a Bird!</h3>
                    <div id="orientation-controls">
                        <button class="orient-btn active" data-orient="left">Left</button>
                        <button class="orient-btn" data-orient="front">Front</button>
                        <button class="orient-btn" data-orient="right">Right</button>
                    </div>
                </div>
                <div id="parts-list"></div>
            </aside>

            <!-- Right panel: scene on top, grass/build area below -->
            <div id="right-panel">
                <section id="scene">
                    <svg id="scene-svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice"></svg>
                </section>
                <section id="construction-area">
                    <div id="build-zone"></div>
                    <div id="ground-strip"></div>
                </section>
            </div>
        </main>

        <footer id="controls">
            <button id="btn-clear" class="ctrl-btn">Clear</button>
            <button id="btn-done" class="ctrl-btn btn-done" disabled>Done!</button>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/bird-magpie.js"></script>
    <script src="js/bird-jay.js"></script>
    <script src="js/bird-chickadee.js"></script>
    <script src="js/bird-robin.js"></script>
    <script src="js/bird-meadowlark.js"></script>
    <script src="js/bird-crow.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/drag.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
